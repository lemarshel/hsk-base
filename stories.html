<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reader  HSK Base</title>
  <link rel="stylesheet" href="css/hsk.css">
  <link rel="stylesheet" href="css/reader.css">
  <script src="js/hsk-head.js"></script>
</head>
<body class="reader-page preload">
<script src="js/hsk-body.js"></script>

<header class="reader-topbar">
  <div class="bar-inner">
    <div class="bar-left">
      <a class="reader-back" href="index.html"> HSK Base</a>
      <span class="bar-divider"></span>
      <span class="bar-story" id="bar-story">Reader</span>
    </div>
    <div class="bar-right">
      <button class="reader-btn toggle active" id="toggle-py" type="button" aria-pressed="true">Pinyin</button>
      <button class="reader-btn toggle active" id="toggle-tr" type="button" aria-pressed="true">Translation</button>
      <div class="reader-nav" aria-label="Story navigation">
        <button class="reader-btn nav" id="reader-prev" type="button" aria-label="Previous story"></button>
        <span class="reader-count" id="reader-count">1 / 1</span>
        <button class="reader-btn nav" id="reader-next" type="button" aria-label="Next story"></button>
      </div>
    </div>
  </div>
</header>

<main class="reader-main">
  <article class="story" aria-live="polite">
    <div class="story-meta" id="story-meta"></div>
    <h1 class="story-title" id="story-title"></h1>
    <p class="story-subtitle" id="story-subtitle"></p>
    <div class="story-content" id="story-content"></div>
  </article>
</main>

<script src="data/stories-data.js"></script>
<script src="js/reader.js"></script>
</body>
</html>
