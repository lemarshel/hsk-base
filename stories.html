<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reader — HSK Base</title>

  <!-- Apply saved palette + theme before first paint (no flash) -->
  <script src="js/app-config.js"></script>
  <script src="js/hsk-head.js"></script>

  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/reader.css">
</head>
<body>
  <!-- Apply theme class to body before paint -->
  <script src="js/hsk-body.js"></script>

  <!-- ── Top bar ──────────────────────────────────────────────────────────── -->
  <header id="reader-bar">
    <div class="rb-left">
      <a href="index.html" class="back-btn">← 词汇</a>
      <span id="story-title" class="story-title"></span>
    </div>

    <div class="rb-controls">
      <button id="btn-toggle-py" class="ctrl-btn active" title="Toggle pinyin">拼音</button>
      <button id="btn-toggle-tr" class="ctrl-btn active" title="Toggle translation">翻译</button>

      <div class="speed-wrap">
        <label class="ctrl-label" for="tts-speed">速度</label>
        <select id="tts-speed" class="ctrl-select">
          <option value="0.5">0.5×</option>
          <option value="0.75">0.75×</option>
          <option value="1" selected>1×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
        </select>
      </div>

      <button id="btn-prev" class="ctrl-btn nav-btn" title="Previous text">‹</button>
      <span id="story-counter" class="story-counter">1 / 1</span>
      <button id="btn-next" class="ctrl-btn nav-btn" title="Next text">›</button>
    </div>
  </header>

  <!-- ── Audio / progress bar ─────────────────────────────────────────────── -->
  <div id="audio-bar">
    <button id="btn-read-all" class="read-all-btn" title="Read full text aloud">▶</button>
    <div id="progress-track" class="progress-track" title="Click to seek">
      <div id="progress-fill" class="progress-fill"></div>
    </div>
    <span id="progress-pct" class="progress-pct">0%</span>
  </div>

  <!-- ── Reading area ──────────────────────────────────────────────────────── -->
  <main id="reading-area">
    <!-- Sentences are rendered here by reader.js -->
  </main>

  <script src="data/stories-data.js"></script>
  <script src="js/reader.js"></script>
</body>
</html>
